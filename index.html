<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Runner 2060</title>
    <style>
        #unity-container {
            width: 960px;
            height: 600px;
            margin: auto;
        }

        #unity-canvas {
            width: 100%;
            height: 100%;
            background: grey;
        }

        #centered-content {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
    </style>
</head>
<body>
    <div id="centered-content">
        <button id="telegram-login-button">Login with Telegram</button>
    </div>
    <div id="unity-container" style="display:none;">
        <div id="unity-loading-bar">
            <div id="unity-progress-bar-full"></div>
        </div>
        <canvas id="unity-canvas"></canvas>
        <div id="unity-warning"></div>
        <button id="unity-fullscreen-button">Fullscreen</button>
    </div>
    <script src="https://telegram.org/js/telegram-widget.js?19" async></script>
    <script>var unityInstance = null;
        var telegramUser = null;

        function onTelegramAuth(user) {
            telegramUser = user;
            alert('Logged in as ' + user.first_name + ' ' + user.last_name + ' (' + user.id + (user.username ? ', @' + user.username : '') + ')');
            trySendTelegramDataToUnity();
            document.getElementById('centered-content').style.display = 'none';
            document.getElementById('unity-container').style.display = 'block';
        }

        function trySendTelegramDataToUnity() {
            if (unityInstance && telegramUser) {
                unityInstance.SendMessage('GameManager', 'ReceiveTelegramData', telegramUser.id + ',' + telegramUser.first_name + ' ' + telegramUser.last_name);
            } else {
                setTimeout(trySendTelegramDataToUnity, 100);
            }
        }

        const firebaseConfig = {
            apiKey: "AIzaSyCWGA7w0obawhbuQfwVCv6yqByddbIH1cA",
            authDomain: "satoshidash-167f3.firebaseapp.com",
            databaseURL: "https://satoshidash-167f3-default-rtdb.firebaseio.com",
            projectId: "satoshidash-167f3",
            storageBucket: "satoshidash-167f3.appspot.com",
            messagingSenderId: "154140258400",
            appId: "1:154140258400:web:826313b3102cef2c079305",
            measurementId: "G-E6CYBRLT7H"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        var container = document.querySelector("#unity-container");
        var canvas = document.querySelector("#unity-canvas");
        var loadingBar = document.querySelector("#unity-loading-bar");
        var progressBarFull = document.querySelector("#unity-progress-bar-full");
        var fullscreenButton = document.querySelector("#unity-fullscreen-button");
        var centeredContent = document.querySelector("#centered-content");

        function unityShowBanner(msg, type) {
            var warningBanner = document.querySelector("#unity-warning");
            function updateBannerVisibility() {
                warningBanner.style.display = warningBanner.children.length ? 'block' : 'none';
            }
            var div = document.createElement('div');
            div.innerHTML = msg;
            warningBanner.appendChild(div);
            if (type == 'error') div.style = 'background: red; padding: 10px;';
            else {
                if (type == 'warning') div.style = 'background: yellow; padding: 10px;';
                setTimeout(function () {
                    warningBanner.removeChild(div);
                    updateBannerVisibility();
                }, 5000);
            }
            updateBannerVisibility();
        }

        var buildUrl = "Build";
        var loaderUrl = buildUrl + "/web.loader.js?v=" + new Date().getTime();
        var config = {
            dataUrl: buildUrl + "/web.data?v=" + new Date().getTime(),
            frameworkUrl: buildUrl + "/web.framework.js?v=" + new Date().getTime(),
            codeUrl: buildUrl + "/web.wasm?v=" + new Date().getTime(),
            streamingAssetsUrl: "StreamingAssets",
            companyName: "CryptomeriaLabs",
            productName: "Runner2060",
            productVersion: "1.0.12",
            showBanner: unityShowBanner,
        };

        function clearIndexedDB() {
            return new Promise((resolve, reject) => {
                var dbDeleteRequest = indexedDB.deleteDatabase("UnityCache");
                dbDeleteRequest.onerror = function (event) {
                    console.log("Error deleting database.");
                    reject(event);
                };
                dbDeleteRequest.onsuccess = function (event) {
                    console.log("Database deleted successfully");
                    resolve();
                };
            });
        }

        async function initializeUnity() {
            await clearIndexedDB();

            if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
                var meta = document.createElement('meta');
                meta.name = 'viewport';
                meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
                document.getElementsByTagName('head')[0].appendChild(meta);
                container.className = "unity-mobile";
                canvas.className = "unity-mobile";
            } else {
                canvas.style.width = "960px";
                canvas.style.height = "600px";
            }

            loadingBar.style.display = "block";

            var script = document.createElement("script");
            script.src = loaderUrl;
            script.onload = () => {
                createUnityInstance(canvas, config, (progress) => {
                    progressBarFull.style.width = 100 * progress + "%";
                }).then((unityInst) => {
                    unityInstance = unityInst;
                    loadingBar.style.display = "none";
                    fullscreenButton.onclick = () => {
                        unityInst.SetFullscreen(1);
                    };
                    trySendTelegramDataToUnity();
                }).catch((message) => {
                    console.error(message);
                    alert(message);
                });
            };
            document.body.appendChild(script);
        }

        initializeUnity();</script>
</body>
</html>
